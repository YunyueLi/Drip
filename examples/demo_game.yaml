# Sample campaign spec for `drip demo` and the README quickstart.
#
# This is a fictional indie mobile game. Replace with your own when you
# install drip-agent locally:
#
#   drip launch --game ./your_game.yaml
#
# Drip is vertical-neutral by default. Knowledge Packs (v0.1) override
# the defaults below with vertical-specific signals and prompts — see
# `packs/` for the anime / gacha, DTC, and tools-app examples.

title: "Astral Drift"
genre: "indie mobile game"
art_style: "stylized, cinematic"
target_audience: "mobile gamers aged 18-34, JP / SEA / TW"

key_characters:
  - "Riku — a sky-pirate captain with a glowing compass"
  - "Hina — a shrine maiden who befriends spirits"
  - "Vesper — an idol singer with a mysterious past"

store_links:
  ios: "https://example.com/astral-drift-ios"
  android: "https://example.com/astral-drift-android"

creative_brief: >
  Mid-2026 summer launch. Use cinematic intros for Riku, ambient
  slice-of-life beats for Hina, and high-energy moments for Vesper.
  Keep the visual tone consistent across markets; localize copy only.
  Reveal order in marketing should follow the in-game introduction
  order: Hina -> Vesper -> Riku.
