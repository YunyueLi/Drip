name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-type:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Create venv & install (core + dev)
        run: |
          uv venv
          uv pip install -e ".[dev]"

      - name: Ruff
        run: uv run ruff check .

      - name: mypy
        run: uv run mypy src

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Create venv & install (core + dev)
        run: |
          uv venv
          uv pip install -e ".[dev]"

      - name: Pytest
        run: uv run pytest -v

  smoke-cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Create venv & install (core only)
        run: |
          uv venv
          uv pip install -e .

      - name: drip --help
        run: uv run drip --help

      - name: drip demo (dry-run, no API keys, no provider SDKs)
        run: uv run drip demo
