<svg xmlns="http://www.w3.org/2000/svg" width="600" height="380" viewBox="0 0 600 380" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">
  <!-- card -->
  <rect x="16" y="16" width="568" height="348" rx="18" fill="#ffffff" stroke="#e7ebf3" stroke-width="1.5"/>
  <!-- browser bar -->
  <path d="M16 34 Q16 16 34 16 H566 Q584 16 584 34 V60 H16 Z" fill="#f6f8fc"/>
  <line x1="16" y1="60" x2="584" y2="60" stroke="#eef1f7" stroke-width="1.5"/>
  <circle cx="40" cy="38" r="5" fill="#ff5f57"/><circle cx="58" cy="38" r="5" fill="#febc2e"/><circle cx="76" cy="38" r="5" fill="#28c840"/>
  <text x="104" y="43" font-family="ui-monospace,Menlo,monospace" font-size="13" fill="#8a93a8">drip · decision card</text>

  <!-- head -->
  <text x="40" y="100" font-size="18" font-weight="700" fill="#0b1220">Meta_Prospecting_v3</text>
  <text x="40" y="120" font-family="ui-monospace,Menlo,monospace" font-size="12.5" fill="#8a93a8">DTC_US · 7-day window</text>
  <rect x="416" y="80" width="148" height="47" rx="11" fill="#1a9d5a"/>
  <text x="490" y="103" text-anchor="middle" font-size="15" font-weight="800" fill="#ffffff">SCALE +20%</text>
  <text x="490" y="119" text-anchor="middle" font-size="11" fill="#d7f0e1">$200 → $240/day</text>

  <!-- signal chips: row 1 -->
  <g>
    <rect x="40" y="146" width="122" height="54" rx="10" fill="#fff" stroke="#eef1f7" stroke-width="1.5"/>
    <circle cx="54" cy="165" r="3.5" fill="#1a9d5a"/><text x="64" y="169" font-size="10.5" font-weight="600" fill="#8a93a8">CPP</text>
    <text x="54" y="189" font-family="ui-monospace,monospace" font-size="14" font-weight="700" fill="#0b1220">$18</text>

    <rect x="173" y="146" width="122" height="54" rx="10" fill="#fff" stroke="#eef1f7" stroke-width="1.5"/>
    <circle cx="187" cy="165" r="3.5" fill="#1a9d5a"/><text x="197" y="169" font-size="10.5" font-weight="600" fill="#8a93a8">ROAS</text>
    <text x="187" y="189" font-family="ui-monospace,monospace" font-size="14" font-weight="700" fill="#0b1220">3.8×</text>

    <rect x="306" y="146" width="122" height="54" rx="10" fill="#fff" stroke="#eef1f7" stroke-width="1.5"/>
    <circle cx="320" cy="165" r="3.5" fill="#1a9d5a"/><text x="330" y="169" font-size="10.5" font-weight="600" fill="#8a93a8">CVR</text>
    <text x="320" y="189" font-family="ui-monospace,monospace" font-size="14" font-weight="700" fill="#0b1220">2.5%</text>

    <rect x="439" y="146" width="122" height="54" rx="10" fill="#fff" stroke="#eef1f7" stroke-width="1.5"/>
    <circle cx="453" cy="165" r="3.5" fill="#1a9d5a"/><text x="463" y="169" font-size="10.5" font-weight="600" fill="#8a93a8">CTR</text>
    <text x="453" y="189" font-family="ui-monospace,monospace" font-size="14" font-weight="700" fill="#0b1220">1.4%</text>
  </g>
  <!-- signal chips: row 2 -->
  <g>
    <rect x="40" y="210" width="122" height="54" rx="10" fill="#fff" stroke="#eef1f7" stroke-width="1.5"/>
    <circle cx="54" cy="229" r="3.5" fill="#1a9d5a"/><text x="64" y="233" font-size="10.5" font-weight="600" fill="#8a93a8">Freq</text>
    <text x="54" y="253" font-family="ui-monospace,monospace" font-size="14" font-weight="700" fill="#0b1220">1.8</text>

    <rect x="173" y="210" width="122" height="54" rx="10" fill="#fff" stroke="#eef1f7" stroke-width="1.5"/>
    <circle cx="187" cy="229" r="3.5" fill="#1a9d5a"/><text x="197" y="233" font-size="10.5" font-weight="600" fill="#8a93a8">Spend</text>
    <text x="187" y="253" font-family="ui-monospace,monospace" font-size="14" font-weight="700" fill="#0b1220">$200</text>

    <rect x="306" y="210" width="122" height="54" rx="10" fill="#fff" stroke="#eef1f7" stroke-width="1.5"/>
    <circle cx="320" cy="229" r="3.5" fill="#1a9d5a"/><text x="330" y="233" font-size="10.5" font-weight="600" fill="#8a93a8">Purch</text>
    <text x="320" y="253" font-family="ui-monospace,monospace" font-size="14" font-weight="700" fill="#0b1220">11</text>

    <rect x="439" y="210" width="122" height="54" rx="10" fill="#fff" stroke="#eef1f7" stroke-width="1.5"/>
    <circle cx="453" cy="229" r="3.5" fill="#c98a14"/><text x="463" y="233" font-size="10.5" font-weight="600" fill="#8a93a8">Headroom</text>
    <text x="453" y="253" font-family="ui-monospace,monospace" font-size="14" font-weight="700" fill="#0b1220">83%</text>
  </g>

  <!-- rule chain -->
  <rect x="40" y="278" width="521" height="44" rx="10" fill="#eaf0fe"/>
  <text x="56" y="298" font-size="12" fill="#475069">rule chain: 7/8 signals green · unit economics healthy (CPP&lt;target, ROAS&gt;3×) →</text>
  <text x="56" y="314" font-size="12" font-weight="700" fill="#0052d9">scale at the conservative step (+20%), not +50%.</text>

  <!-- footer -->
  <text x="40" y="350" font-size="12" fill="#8a93a8">confidence <tspan font-weight="700" fill="#1a9d5a">HIGH</tspan> · auto-revert if CPP &gt; $22</text>
  <rect x="477" y="334" width="84" height="28" rx="8" fill="#0052d9"/>
  <text x="519" y="352" text-anchor="middle" font-size="12.5" font-weight="700" fill="#ffffff">Approve ✓</text>
</svg>
